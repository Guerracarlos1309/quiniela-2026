<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundial 2026 | Predicciones</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Quiniela Mundial 2026</h1>
        <p class="subtitle">Ingresa tus predicciones para la fase de grupos</p>
    </header>

    <main>
        <section class="card">
            <div class="group-header">⚽ Datos del Participante</div>
            <div class="hero-form-section">
                <div class="input-group">
                    <label for="full-name">Nombre Completo</label>
                    <input type="text" id="full-name" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="input-group">
                    <label for="phone">Teléfono</label>
                    <input type="tel" id="phone" placeholder="Ej. +52 5512345678" required>
                </div>
            </div>
        </section>

        <!-- Tabs for Groups -->
        <div id="groups-tabs" class="matchday-tabs"></div>

        <form id="quiniela-form">
            <div id="groups-wrapper"></div>

            <div class="submit-container">
                <button type="submit" class="btn-primary">Enviar Quiniela completa</button>
                <div id="message-box"></div>
            </div>
        </form>
    </main>

    <script src="js/config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
